<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriRain | Precision Rice Farming</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html { scroll-behavior: smooth; }
        /* Map needs a clear height to show up */
        #map-section { height: 500px; width: 100%; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-[1000]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">AgriRain</h1>
            <a href="#map-section" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition font-medium">Launch Map</a>
        </div>
    </nav>

    <header class="h-[50vh] flex items-center justify-center bg-slate-900 relative">
        <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1530507629858-e4977d30e9e0?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center"></div>
        <div class="relative text-center px-4">
            <h2 class="text-4xl md:text-6xl font-black text-white mb-4">Select Your Field</h2>
            <p class="text-slate-300 text-lg">Pin your exact farm location to get localized rain forecasts.</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto -mt-20 relative z-20 px-4 pb-20">
        <div class="bg-white p-4 rounded-3xl shadow-2xl border border-slate-200">
            <div id="map-section" class="rounded-2xl"></div>
            
            <div id="coord-info" class="mt-4 p-4 bg-blue-50 border border-blue-100 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs uppercase tracking-wider text-blue-500 font-bold">Selected Coordinates</p>
                    <p id="lat-lng-text" class="text-lg font-mono text-slate-700 italic">Click the map to pin a location...</p>
                </div>
                <button id="confirm-loc" class="hidden bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                    Confirm Location
                </button>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/weatherService.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
