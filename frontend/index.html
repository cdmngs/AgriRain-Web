<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriRain | Smart Forecasts for Rice Farmers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="fixed w-full bg-white/80 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">AgriRain</h1>
            <div class="space-x-6 hidden md:block">
                <a href="#home" class="hover:text-blue-500 transition">Home</a>
                <a href="#map-section" class="hover:text-blue-500 transition">Map</a>
            </div>
        </div>
    </nav>

    <header id="home" class="relative h-screen flex items-center justify-center bg-slate-900 overflow-hidden">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1530507629858-e4977d30e9e0?auto=format&fit=crop&w=1920&q=80" 
                 alt="Rice field background" class="w-full h-full object-cover">
        </div>

        <div class="relative z-10 text-center px-4">
            <h2 class="text-4xl md:text-6xl font-extrabold text-white mb-6">
                Smarter Planting for <br><span class="text-blue-400">Rice Farmers</span>
            </h2>
            <p class="text-lg md:text-xl text-slate-200 mb-8 max-w-2xl mx-auto">
                Localized rain forecasts and decision support to protect your crops 
                and optimize your harvest activities.
            </p>
            <a href="#map-section" 
               class="inline-block bg-blue-500 hover:bg-blue-400 text-white font-bold py-4 px-10 rounded-full transition transform hover:scale-105 shadow-xl">
                Get Started with Your Farm
            </a>
        </div>
    </header>

    <section id="map-section" class="h-screen bg-white flex items-center justify-center border-t border-slate-200">
        <div class="text-center">
            <h3 class="text-3xl font-bold mb-4">Map Section</h3>
            <p class="text-slate-500">Coming soon in AG-2...</p>
        </div>
    </section>

</body>
</html>
