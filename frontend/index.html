<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriRain | Precision Rice Farming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html { scroll-behavior: smooth; }
        #map-section { height: 450px; width: 100%; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-[1000]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">AgriRain</h1>
            <a href="#map-tool" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition font-medium">Launch Tool</a>
        </div>
    </nav>

    <header class="h-[40vh] flex items-center justify-center bg-slate-900 relative">
        <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1530507629858-e4977d30e9e0?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center"></div>
        <div class="relative text-center px-4">
            <h2 class="text-4xl font-black text-white mb-2">Farm Forecast Tool</h2>
            <p class="text-slate-300">Pin your field and select your dates to begin.</p>
        </div>
    </header>

    <main id="map-tool" class="max-w-4xl mx-auto -mt-16 relative z-20 px-4 pb-20">
        <div class="bg-white p-4 rounded-3xl shadow-2xl border border-slate-200">
            
            <div id="map-section" class="rounded-2xl mb-4"></div>
            
            <div id="coordinates-display" class="p-4 bg-blue-50 border border-blue-100 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs uppercase tracking-wider text-blue-500 font-bold">Step 1: Farm Location</p>
                    <p id="lat-lng-text" class="text-lg font-mono text-slate-700 italic">Click the map to pin your field...</p>
                </div>
            </div>

            <div id="date-selection" class="mt-6 p-6 bg-slate-50 border border-slate-200 rounded-2xl hidden">
                <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Step 2: Select Forecast Dates</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-400">Start Date</label>
                        <input type="date" id="start-date" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-slate-400">End Date</label>
                        <input type="date" id="end-date" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <button id="get-forecast-btn" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition shadow-lg">
                    Generate Farming Analysis
                </button>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/weatherService.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
